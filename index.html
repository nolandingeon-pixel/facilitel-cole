<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>École Virtuelle - Version Finale</title>
    <style>
        :root { --sidebar-width: 250px; --primary: #8e44ad; --orange: #e67e22; --bg: #fff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* --- MODE GHOST MULTI-PAGES (N) --- */
        #ghost-overlay { position: fixed; inset: 0; z-index: 100000; display: none; background: #fff; }
        #ghost-overlay img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        #loading-spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; border: 6px solid #f3f3f3; border-top: 6px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* --- SIDEBAR & ONGLETS --- */
        #sidebar { width: var(--sidebar-width); border-right: 2px solid var(--orange); padding: 15px; background: #fff; }
        .tabs-top { display: flex; gap: 8px; margin-bottom: 25px; }
        .tab-btn { padding: 6px 18px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; background: #f8f8f8; }
        .tab-btn.active { background: var(--orange); color: white; border-color: var(--orange); }
        .menu-title { font-weight: bold; font-size: 15px; margin: 15px 0 10px 0; color: #333; }
        .chapter-link { display: block; color: blue; text-decoration: underline; cursor: pointer; font-size: 14px; margin-left: 10px; margin-bottom: 12px; }

        /* --- CONTENU PRINCIPAL --- */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding-top: 25px; position: relative; }
        .stats-bar { display: flex; gap: 20px; background: white; padding: 10px 30px; border: 2px solid var(--primary); border-radius: 35px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 35px; }
        .stats-bar span { font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 8px; }

        /* --- CHAT & BOUTIQUE --- */
        .chat-area { display: flex; gap: 8px; margin-bottom: 25px; }
        .chat-input { padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; width: 280px; }
        .btn-ok { background: #eee; border: 1px solid #999; padding: 6px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .shop-box { display: flex; gap: 20px; margin-bottom: 20px; }
        .item { width: 100px; height: 100px; border: 2px solid #ccc; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; position: relative; }
        .item.bought { border-color: #2ecc71; background: #f0fff0; }

        /* --- EXERCICES --- */
        #exercise-card { background: white; padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 480px; text-align: center; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: none; z-index: 10; }
        .btn-opt { display: block; width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; background: #f9f9f9; font-size: 15px; transition: 0.2s; }
        .btn-opt:hover { background: #f0f0f0; border-color: var(--primary); }

        /* --- GEOMETRY DASH --- */
        #gd-game { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 350px; background: #222; border: 4px solid #0f0; z-index: 15000; display: none; border-radius: 15px; overflow: hidden; }
        .cube { width: 40px; height: 40px; background: #0f0; position: absolute; bottom: 50px; left: 50px; }
        .obstacle { width: 35px; height: 35px; background: #e74c3c; position: absolute; bottom: 50px; right: -50px; }

        /* --- PET --- */
        #pet-container { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; align-items: flex-end; }
        .bubble { background: white; border: 1px solid #ccc; border-radius: 18px; padding: 15px; margin-bottom: 12px; font-size: 14px; max-width: 220px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .cat-icon { width: 120px; height: 120px; background: url('https://cdn-icons-png.flaticon.com/512/616/616430.png') no-repeat center/contain; }
    </style>
</head>
<body>

    <div id="ghost-overlay">
        <img id="ghost-img" src="https://r.jina.ai/i/05479f648d7c433388701e6706bc5f49">
        <div id="loading-spinner"></div>
    </div>

    <div id="sidebar">
        <div class="tabs-top">
            <div class="tab-btn active">6e</div>
            <div class="tab-btn">3e</div>
        </div>
        <div class="menu-title">MATHÉMATIQUES</div>
        <a class="chapter-link" onclick="loadLesson('vocab')">📁 Vocabulaire Opérations</a>
        <a class="chapter-link" onclick="loadLesson('entiers')">📁 Nombres Entiers</a>
        <a class="chapter-link" onclick="loadLesson('decimaux')">📁 Nombres Décimaux</a>
    </div>

    <div id="main-content">
        <div class="stats-bar">
            <span>💰 <b id="coins-val">36540</b></span>
            <span>⭐ <b id="xp-val">55535</b></span>
            <span>🎓 Niv. <b id="lvl-val">556</b></span>
        </div>

        <div class="chat-area">
            <input type="text" id="chat-in" class="chat-input" placeholder="pari, blague, calcul...">
            <button class="btn-ok" onclick="petAction()">OK</button>
        </div>

        <div class="shop-box">
            <div class="item bought">🎓<br><b>50 💰</b></div>
            <div class="item" style="opacity: 0.1;">💀<br><b>0 💰</b></div>
        </div>

        <div id="exercise-card">
            <p id="q-text" style="font-weight:bold; font-size: 1.2em;"></p>
            <div id="opt-cont"></div>
        </div>

        <p style="position:absolute; bottom:15px; color:#bbb; font-size:11px;">
            N: Ghost | G: Jeu | 1: FAHHHH! | 2: Discord | Espace: Saut
        </p>
    </div>

    <div id="gd-game">
        <div class="cube" id="cube"></div>
        <div id="obs" class="obstacle"></div>
        <div style="position:absolute; bottom:0; width:100%; height:50px; background:#444;"></div>
    </div>

    <div id="pet-container">
        <div class="bubble" id="pet-msg">Révise tes cours pour gagner des pièces ! 😼</div>
        <div class="cat-icon"></div>
    </div>

    <script>
        // --- DONNÉES & SAUVEGARDE ---
        let coins = parseInt(localStorage.getItem('coins')) || 36540;
        let xp = parseInt(localStorage.getItem('xp')) || 55535;
        let isJumping = false;
        const ghostPics = [
            "https://r.jina.ai/i/05479f648d7c433388701e6706bc5f49", // Pronote Accueil
            "https://www.index-education.com/contenu/img/communs/PRONOTE-Espace-Eleves.png", // Notes
            "https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Wikipedia_Main_Page_2023.png/1200px-Wikipedia_Main_Page_2023.png" // Wikipedia
        ];
        let ghostIdx = 0;

        const lessons = {
            "vocab": [
                {q:"Le résultat d'une multiplication est...", a:["Le produit", "La somme"], c:"Le produit"},
                {q:"Le triple d'un nombre est le produit par...", a:["3", "2"], c:"3"}
            ],
            "entiers": [
                {q:"Dans 12 345, le chiffre des centaines est...", a:["3", "4"], c:"3"},
                {q:"La somme de 78 et 90 est...", a:["168", "158"], c:"168"}
            ],
            "decimaux": [
                {q:"Quelle est la partie entière de 3,1416 ?", a:["3", "1416"], c:"3"},
                {q:"Un dixième correspond à la fraction...", a:["1/10", "1/100"], c:"1/10"}
            ]
        };

        // --- SONS ---
        const sFah = new Audio('https://www.myinstants.com/media/sounds/fahhhh.mp3'); 
        const sDiscord = new Audio('https://www.myinstants.com/media/sounds/discord-notification.mp3');

        function update() {
            document.getElementById('coins-val').innerText = coins;
            document.getElementById('xp-val').innerText = xp;
            document.getElementById('lvl-val').innerText = Math.floor(xp/100);
            localStorage.setItem('coins', coins);
            localStorage.setItem('xp', xp);
        }
        update();

        function loadLesson(id) {
            current = lessons[id];
            document.getElementById('exercise-card').style.display = 'block';
            ask();
        }

        function ask() {
            let q = current[Math.floor(Math.random()*current.length)];
            document.getElementById('q-text').innerText = q.q;
            let c = document.getElementById('opt-cont'); c.innerHTML = "";
            q.a.forEach(o => {
                let b = document.createElement('button'); b.className="btn-opt"; b.innerText=o;
                b.onclick = () => { if(o===q.c){coins+=50; xp+=100; document.getElementById('pet-msg').innerText="Correct ! +50💰";} update(); ask(); };
                c.appendChild(b);
            });
        }

        function petAction() {
            let val = document.getElementById('chat-in').value.toLowerCase();
            if(val.includes("blague")) document.getElementById('pet-msg').innerText = "Pourquoi 6 a peur de 7 ? Car 7 8 9 (Seven ate nine) !";
            document.getElementById('chat-in').value = "";
        }

        // --- CLAVIER ---
        document.addEventListener('keydown', (e) => {
            let k = e.key.toLowerCase();
            if (k === '1') sFah.play();
            if (k === '2') sDiscord.play();
            
            if (k === 'n') {
                const g = document.getElementById('ghost-overlay');
                const s = document.getElementById('loading-spinner');
                const img = document.getElementById('ghost-img');
                if (g.style.display === 'none' || g.style.display === '') {
                    g.style.display = 'block'; s.style.display = 'block';
                    setTimeout(() => { 
                        s.style.display = 'none';
                        ghostIdx = (ghostIdx + 1) % ghostPics.length;
                        img.src = ghostPics[ghostIdx];
                    }, 600);
                } else { g.style.display = 'none'; }
            }

            if (k === 'g') {
                const gd = document.getElementById('gd-game');
                gd.style.display = (gd.style.display === 'block' ? 'none' : 'block');
                if(gd.style.display === 'block') startGD();
            }

            if (e.code === 'Space' && !isJumping) {
                isJumping = true;
                let c = document.getElementById('cube');
                c.style.transition = "0.3s"; c.style.bottom = "150px";
                setTimeout(() => { c.style.bottom = "50px"; isJumping = false; }, 300);
            }
        });

        function startGD() {
            let obs = document.getElementById('obs'); let x = 600;
            setInterval(() => { x -= 8; if(x < -40) x = 600; obs.style.right = (600 - x) + "px"; }, 20);
        }
    </script>
</body>
</html>
