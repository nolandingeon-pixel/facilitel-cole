<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>École Virtuelle - Stealth Pro Edition</title>
    <style>
        :root { --sidebar-width: 250px; --primary: #8e44ad; --orange: #e67e22; --bg: #fff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* --- MODE FANTÔME MULTI-PAGES (TOUCHE N) --- */
        #ghost-overlay { position: fixed; inset: 0; z-index: 100000; display: none; background: #fff; }
        #ghost-overlay img { width: 100%; height: 100%; object-fit: cover; }
        #loading-spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* --- VOYANT DE VIGILANCE (AUTO-TEST) --- */
        #spy-light { position: fixed; bottom: 5px; right: 5px; width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; z-index: 200000; opacity: 0.6; pointer-events: none; }
        .spy-alert { background: #e74c3c !important; box-shadow: 0 0 10px #ff0000; }

        /* --- VIRUS & BSOD (TOUCHE P) --- */
        #virus-screen { position: fixed; inset: 0; background: black; color: #0f0; font-family: 'Courier New', monospace; z-index: 30000; padding: 40px; display: none; cursor: none; }
        .virus-flash { animation: flash-bg 0.2s infinite; }
        @keyframes flash-bg { 0%, 100% { background: black; } 50% { background: #800; } }
        #bsod { position: fixed; inset: 0; background: #0078d7; color: white; padding: 100px; display: none; z-index: 30001; }

        /* --- INTERFACE --- */
        #sidebar { width: var(--sidebar-width); border-right: 2px solid var(--orange); padding: 10px; }
        .tab-btn { padding: 5px 15px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; background: #eee; }
        .tab-btn.active { background: var(--orange); color: white; border-color: var(--orange); }
        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .stats-bar { display: flex; gap: 15px; background: white; padding: 8px 20px; border: 2px solid var(--primary); border-radius: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 30px; }
        #exercise-card { background: white; padding: 20px; border-radius: 15px; border: 2px solid var(--primary); width: 400px; text-align: center; display: none; }
        .btn-opt { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body onclick="recordClick()" onbeforeunload="return 'Voulez-vous quitter ?'">

    <div id="ghost-overlay">
        <img id="ghost-img" src="https://r.jina.ai/i/05479f648d7c433388701e6706bc5f49">
        <div id="loading-spinner"></div>
    </div>

    <div id="spy-light"></div>

    <div id="virus-screen">
        <h1 style="color: red; text-align: center;">DETECTION_ALERTE : PIRATAGE DETECTE</h1>
        <div id="virus-log"></div>
    </div>
    <div id="bsod">
        <div style="font-size: 100px;">:(</div>
        <h2>Erreur fatale système.</h2>
        <p>Code: ANTI_MONITORING_CRASH</p>
    </div>

    <div id="sidebar">
        <div style="display:flex; gap:5px; margin-bottom:20px;">
            <div class="tab-btn active">6e</div>
            <div class="tab-btn">3e</div>
        </div>
        <div style="font-weight:bold; margin-bottom:10px;">MATHS</div>
        <a style="color:blue; text-decoration:underline; cursor:pointer;" onclick="openLesson()">📁 Calcul Rapide</a>
    </div>

    <div id="main-content">
        <div class="stats-bar">
            <span>💰 <span id="coins-val">36540</span></span>
            <span>⭐ <span id="xp-val">55535</span></span>
            <span>🎓 Niv. <span id="lvl-val">556</span></span>
        </div>
        
        <div id="exercise-card">
            <p id="q-text" style="font-weight:bold;"></p>
            <div id="opt-cont"></div>
        </div>

        <p style="margin-top:50px; font-size:10px; color:#ccc;">N: Multi-Ghost | P: Virus | F1: Reset | G: Jeu</p>
    </div>

    <script>
        let coins = 36540, xp = 55535, clicks = [];
        
        // --- MODE MULTI-PAGES ---
        const ghostImages = [
            "https://r.jina.ai/i/05479f648d7c433388701e6706bc5f49", // Accueil Pronote
            "https://www.index-education.com/contenu/img/communs/PRONOTE-Espace-Eleves.png", // Notes
            "https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Wikipedia_Main_Page_2023.png/800px-Wikipedia_Main_Page_2023.png" // Recherche
        ];
        let ghostIdx = 0;

        function recordClick() {
            let now = Date.now(); clicks.push(now);
            clicks = clicks.filter(t => now - t < 800);
            if (clicks.length > 5) triggerVirus();
        }

        function triggerVirus() {
            document.getElementById('virus-screen').style.display = 'block';
            document.getElementById('virus-screen').classList.add('virus-flash');
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            let log = document.getElementById('virus-log'), lines = ["> BYPASSING SECURITY...", "> WIPING HARD DRIVE...", "> CRITICAL FAILURE."];
            lines.forEach((l, i) => setTimeout(() => { log.innerHTML += l + "<br>"; if(i===2) setTimeout(()=>document.getElementById('bsod').style.display='block', 1000); }, i * 600));
        }

        // --- VOYANT ALEATOIRE ---
        setInterval(() => {
            const light = document.getElementById('spy-light');
            if (Math.random() > 0.8) light.classList.add('spy-alert');
            else light.classList.remove('spy-alert');
        }, 15000);

        function openLesson() {
            document.getElementById('exercise-card').style.display = 'block';
            document.getElementById('q-text').innerText = "Quelle est la partie entière de 12,45 ?";
            let c = document.getElementById('opt-cont'); c.innerHTML = "<button class='btn-opt' onclick='alert(\"Correct\")'>12</button><button class='btn-opt'>45</button>";
        }

        document.addEventListener('keydown', (e) => {
            let k = e.key.toLowerCase();
            
            // N : SWITCH IMAGES + CHARGEMENT
            if (k === 'n') {
                const ghost = document.getElementById('ghost-overlay');
                const spinner = document.getElementById('loading-spinner');
                const img = document.getElementById('ghost-img');
                
                if (ghost.style.display === 'none' || ghost.style.display === '') {
                    ghost.style.display = 'block';
                    spinner.style.display = 'block';
                    // Simule un petit chargement avant d'afficher la page
                    setTimeout(() => {
                        spinner.style.display = 'none';
                        ghostIdx = (ghostIdx + 1) % ghostImages.length;
                        img.src = ghostImages[ghostIdx];
                    }, 800);
                } else {
                    ghost.style.display = 'none';
                }
            }
            
            if (k === 'p') triggerVirus();
            if (e.key === 'F1') {
                document.getElementById('virus-screen').style.display='none';
                document.getElementById('bsod').style.display='none';
                if(document.exitFullscreen) document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
</html>
