<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>École Virtuelle - Protection Anti-Spam</title>
    <style>
        :root { --sidebar-width: 280px; --primary: #8e44ad; --orange: #e67e22; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* FAUX VIRUS PLEIN ÉCRAN */
        #virus-screen { position: fixed; inset: 0; background: black; color: #0f0; font-family: 'Courier New', monospace; z-index: 10000; padding: 40px; display: none; cursor: none; }
        .virus-red { color: red; font-weight: bold; font-size: 3em; text-align: center; animation: blink 0.15s infinite; margin-top: 10vh; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } }

        /* PANIC SCREEN (ECHAP) */
        #panic-screen { position: fixed; inset: 0; background: white; z-index: 9999; padding: 50px; display: none; overflow-y: auto; }

        /* INTERFACE */
        #sidebar { width: var(--sidebar-width); background: #fff; border-right: 3px solid var(--orange); padding: 15px; overflow-y: auto; }
        .tab { padding: 8px 10px; cursor: pointer; border-radius: 5px; font-weight: bold; background: #f0f0f0; font-size: 0.75em; border: 1px solid #ddd; }
        .tab.active { background: var(--orange); color: white; }
        
        #main-content { flex-grow: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .header-stats { background: white; padding: 12px 25px; border-radius: 50px; border: 2px solid var(--primary); display: flex; gap: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        #exercise-card { background: white; padding: 30px; border-radius: 20px; border: 3px solid var(--primary); width: 100%; max-width: 500px; text-align: center; position: relative; }
        .btn-opt { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 10px; cursor: pointer; background: #fff; font-size: 1.1em; }
        
        .shop-item { display: inline-block; background: white; padding: 10px; border-radius: 15px; border: 2px solid #2ecc71; text-align: center; width: 90px; margin: 5px; }
        .secret-item { opacity: 0.05; cursor: help; border-color: red; }

        #pet-container { position: fixed; bottom: 20px; right: 20px; width: 180px; text-align: center; cursor: pointer; }
        #pet-img-container { position: relative; background: white; border-radius: 50%; padding: 10px; border: 3px solid var(--primary); width: 100px; height: 100px; margin: 0 auto; }
        .pet-avatar { width: 100%; height: 100%; object-fit: contain; }
        .acc-img { position: absolute; display: none; pointer-events: none; z-index: 1001; }
        #acc-hat { top: -25px; left: 10px; width: 85px; }
        .speech-bubble { background: white; padding: 10px; border-radius: 15px; border: 2px solid #ddd; font-size: 0.8em; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="virus-screen">
        <div class="virus-red">TENTATIVE DE TRICHE DÉTECTÉE</div>
        <div id="virus-log" style="font-size: 1.2em; line-height: 1.5;"></div>
        <p style="color:white; margin-top: 50px; opacity: 0.5;">ERROR_CODE: 0xSPAM_LIMIT_EXCEEDED</p>
    </div>

    <div id="panic-screen">
        <h1>Analyse Fonctionnelle et Topologie</h1>
        <p>Un espace métrique est dit complet si toute suite de Cauchy de cet espace converge. Dans le cadre des espaces de Banach...</p>
    </div>

    <div id="sidebar">
        <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
            <div id="b6" class="tab active" onclick="changeClass('6eme')">6e</div>
            <div id="b3" class="tab" onclick="changeClass('3eme')">3e</div>
        </div>
        <div id="menu-content"></div>
    </div>

    <div id="main-content">
        <div class="header-stats">
            <span>💰 <b id="coins-val">0</b></span>
            <span>⭐ <b id="xp-val">0</b></span>
            <span>🎓 Niv. <b id="lvl-val">1</b></span>
        </div>

        <div id="exercise-card" style="display:none;">
            <p id="question-text" style="font-weight:bold;"></p>
            <div id="options-container"></div>
        </div>

        <div style="margin-top:20px;">
            <input type="text" id="chat-input" placeholder="pari, blague...">
            <button onclick="askPet()">OK</button>
        </div>

        <div class="shop-container">
            <div class="shop-item">🎓<br><button onclick="buy('hat', 50)">50💰</button></div>
            <div class="shop-item secret-item">💀<br><button onclick="triggerVirus()">0💰</button></div>
        </div>
    </div>

    <div id="pet-container" onclick="clickPet()">
        <div class="speech-bubble" id="pet-talk">Si tu cliques trop vite, je m'énerve ! 😼</div>
        <div id="pet-img-container">
            <img id="acc-hat" class="acc-img" src="https://www.pngall.com/wp-content/uploads/2016/05/Graduation-Hat-PNG-Clipart.png">
            <img class="pet-avatar" src="https://cdn-icons-png.flaticon.com/512/616/616430.png">
        </div>
    </div>

    <script>
        const sounds = { 1: 'https://www.myinstants.com/media/sounds/mario-coin.mp3', 3: 'https://www.myinstants.com/media/sounds/fail-horn.mp3' };
        
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        let xp = parseInt(localStorage.getItem('xp')) || 0;
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
        
        // ANTI-SPAM SYSTEM
        let clickHistory = [];
        function checkSpam() {
            const now = Date.now();
            clickHistory.push(now);
            clickHistory = clickHistory.filter(t => now - t < 1000); // Garde les clics de la dernière seconde
            if (clickHistory.length > 4) { // Plus de 4 clics par seconde = VIRUS
                triggerVirus();
                return true;
            }
            return false;
        }

        function triggerVirus() {
            const vs = document.getElementById('virus-screen');
            vs.style.display = 'block';
            
            // Forcer le Plein Écran
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            let log = document.getElementById('virus-log');
            log.innerHTML = "";
            let lines = ["> SPAM DETECTED", "> FORCING FULLSCREEN...", "> LOCKING SYSTEM...", "> OVERWRITING BIOS...", "> DELETE ALL DATA : 22%...", "> FATAL ERROR."];
            lines.forEach((l, i) => setTimeout(() => log.innerHTML += l + "<br>", i * 500));
        }

        function changeClass(lvl) {
            if(checkSpam()) return;
            const menu = document.getElementById('menu-content');
            menu.innerHTML = "<b>MATHS</b><br><a href='#' onclick='startQ()'>📁 Calcul Rapide</a>";
        }

        function startQ() {
            document.getElementById('exercise-card').style.display = 'block';
            nextQuestion();
        }

        function nextQuestion() {
            document.getElementById('question-text').innerText = "Combien font " + Math.floor(Math.random()*10) + " x " + Math.floor(Math.random()*10) + " ?";
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            [12, 24, 36].forEach(opt => {
                const b = document.createElement('button');
                b.className = "btn-opt"; b.innerText = opt;
                b.onclick = () => { if(!checkSpam()) nextQuestion(); };
                container.appendChild(b);
            });
        }

        function clickPet() { if(!checkSpam()) { coins++; save(); } }

        function askPet() {
            if(checkSpam()) return;
            const talk = document.getElementById('pet-talk');
            talk.innerText = "Je t'ai à l'oeil...";
        }

        function buy(item, price) { if(coins >= price) { coins -= price; inventory.push(item); save(); } }

        function save() {
            document.getElementById('coins-val').innerText = coins;
            document.getElementById('xp-val').innerText = xp;
            document.getElementById('lvl-val').innerText = Math.floor(xp/100) + 1;
            inventory.forEach(i => document.getElementById('acc-'+i).style.display = 'block');
            localStorage.setItem('coins', coins);
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === "Escape") {
                const ps = document.getElementById('panic-screen');
                ps.style.display = ps.style.display === 'block' ? 'none' : 'block';
            }
            if(e.key.toLowerCase() === "p") triggerVirus();
            if(e.key === "F1") {
                document.getElementById('virus-screen').style.display = 'none';
                if (document.exitFullscreen) document.exitFullscreen();
            }
        });

        changeClass('6eme'); save();
    </script>
</body>
</html>
