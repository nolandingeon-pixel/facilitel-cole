<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plateforme Éducative Ludique</title>
    <style>
        :root { --sidebar-width: 280px; --primary: #8e44ad; --orange: #e67e22; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* MENU GAUCHE STYLE SÉSAMATH */
        #sidebar { width: var(--sidebar-width); background: #fff; border-right: 3px solid var(--orange); padding: 15px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .classe-tabs { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab { padding: 8px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; background: #f0f0f0; border: 1px solid #ddd; font-size: 0.8em; transition: 0.3s; }
        .tab.active { background: var(--orange); color: white; border-color: #d35400; }
        
        .category-title { background: #fde3d0; color: #d35400; padding: 6px 12px; font-weight: bold; font-size: 0.8em; margin-top: 15px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .chapter-link { display: block; padding: 8px 12px; color: #555; text-decoration: none; font-size: 0.85em; cursor: pointer; border-left: 3px solid transparent; transition: 0.2s; }
        .chapter-link:hover { background: #fff4ed; border-left: 3px solid var(--orange); color: #000; }

        /* ZONE CENTRALE */
        #main-content { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; position: relative; overflow-y: auto; }
        .header-stats { position: sticky; top: 0; background: white; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--primary); display: flex; gap: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; margin-bottom: 30px; }
        
        #exercise-card { background: white; padding: 40px; border-radius: 25px; border: 4px solid var(--primary); width: 100%; max-width: 600px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .btn-opt { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 2px solid #edf2f7; border-radius: 12px; cursor: pointer; background: #fff; font-size: 1.1em; font-weight: 500; transition: all 0.2s; }
        .btn-opt:hover { background: #f8f5ff; border-color: var(--primary); transform: scale(1.02); }

        /* LE CHAT (BAS À DROITE) */
        #pet-container { position: fixed; bottom: 20px; right: 20px; width: 220px; text-align: center; z-index: 100; }
        #pet-img-container { position: relative; background: white; border-radius: 50%; padding: 15px; border: 4px solid var(--primary); box-shadow: 0 8px 25px rgba(0,0,0,0.2); width: 120px; height: 120px; margin: 0 auto; }
        .pet-avatar { width: 100%; height: 100%; object-fit: contain; }
        #pet-accessory { position: absolute; top: -25px; left: 25px; width: 80px; display: none; z-index: 105; pointer-events: none; }
        .speech-bubble { background: white; padding: 12px; border-radius: 18px; border: 2px solid #ddd; font-size: 0.9em; margin-bottom: 12px; position: relative; font-weight: bold; color: #444; }

        /* SOUNDBOARD SECRET */
        #soundboard { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 35px; border-radius: 30px; border: 8px solid var(--primary); box-shadow: 0 0 150px rgba(0,0,0,0.7); z-index: 2000; text-align: center; display: none; }
        .sound-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 25px; }
        .sound-btn { padding: 25px; font-size: 30px; border: none; border-radius: 20px; cursor: pointer; background: #f1c40f; transition: 0.1s; }
        .sound-btn:hover { filter: brightness(1.1); }
        
        .shop-btn { margin-top: 25px; padding: 15px 35px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 1em; box-shadow: 0 4px 0 #27ae60; transition: 0.2s; }
        .shop-btn:active { transform: translateY(3px); box-shadow: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="classe-tabs">
            <div class="tab active" onclick="changeClass('6eme')">6e</div>
            <div class="tab" onclick="changeClass('5eme')">5e</div>
            <div class="tab" onclick="changeClass('4eme')">4e</div>
            <div class="tab" onclick="changeClass('3eme')">3e</div>
        </div>
        <div id="menu-content"></div>
    </div>

    <div id="main-content">
        <div class="header-stats">
            <span>💰 Pièces: <b id="coins-val">0</b></span>
            <span>⭐ XP: <b id="xp-val">0</b></span>
            <span>🎓 Niveau: <b id="lvl-val">1</b></span>
        </div>

        <h2 id="current-category">Sélectionne un chapitre pour commencer</h2>
        
        <div id="exercise-card" class="hidden">
            <p id="question-text"></p>
            <div id="options-container"></div>
        </div>

        <button class="shop-btn" onclick="buyHat()">🛒 Boutique : Chapeau (50 pièces)</button>
        <p style="color: #999; font-size: 0.8em; margin-top: 15px;">Secret : Appuie sur la touche <b>U</b> pour t'ambiancer !</p>
    </div>

    <div id="pet-container">
        <div class="speech-bubble" id="pet-talk">Salut ! Prêt à devenir un génie ?</div>
        <div id="pet-img-container">
            <img id="pet-accessory" src="https://cdn-icons-png.flaticon.com/512/7153/7153108.png">
            <img class="pet-avatar" src="https://cdn-icons-png.flaticon.com/512/616/616430.png">
        </div>
    </div>

    <div id="soundboard">
        <h2 style="margin:0; color:var(--primary)">🎵 SOUNDBOARD DÉTENTE 🎵</h2>
        <p>Appuie sur <b>U</b> pour revenir au travail</p>
        <div class="sound-grid">
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/anime-wow.mp3')">✨</button>
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/tada.mp3')">🎉</button>
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/mario-coin.mp3')">💰</button>
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/discord-notification.mp3')">🔔</button>
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/yeet.mp3')">🚀</button>
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/error.mp3')">❌</button>
        </div>
    </div>

    <script>
        const schoolData = {
            "6eme": {
                "MATHÉMATIQUES": ["Décimaux", "Périmètres"],
                "FRANÇAIS": ["Grammaire", "Orthographe"],
                qs: [
                    { q: "Maths : Quelle est la moitié de 50 ?", a: ["25", "15", "30"], c: "25" },
                    { q: "Français : Quel est le pluriel de 'cheval' ?", a: ["Chevaux", "Chevals", "Cheveaux"], c: "Chevaux" },
                    { q: "Maths : 1,5 + 2,7 = ?", a: ["4,2", "3,2", "4,5"], c: "4,2" },
                    { q: "Géo : Quel est le plus grand continent ?", a: ["Asie", "Afrique", "Europe"], c: "Asie" }
                ]
            },
            "5eme": {
                "HISTOIRE": ["Le Moyen-Âge", "L'Islam"],
                "MATHS": ["Priorités", "Relatifs"],
                qs: [
                    { q: "Histoire : En quelle année commence le règne de Louis XIV ?", a: ["1643", "1715", "1515"], c: "1643" },
                    { q: "Maths : (-3) x (-4) = ?", a: ["12", "-12", "7"], c: "12" },
                    { q: "Français : 'Je mangerai' est à quel temps ?", a: ["Futur simple", "Présent", "Passé simple"], c: "Futur simple" }
                ]
            },
            "4eme": {
                "PHYSIQUE": ["Électricité", "Molécules"],
                "MATHS": ["Pythagore", "Puissances"],
                qs: [
                    { q: "Physique : Quelle est l'unité de la tension ?", a: ["Volt", "Ampère", "Ohm"], c: "Volt" },
                    { q: "Maths : Dans un triangle rectangle, le côté le plus long est...", a: ["L'hypoténuse", "L'adjacent", "L'opposé"], c: "L'hypoténuse" },
                    { q: "Histoire : En quel siècle a eu lieu la Révolution Française ?", a: ["18ème", "17ème", "19ème"], c: "18ème" }
                ]
            },
            "3eme": {
                "BREVET": ["Dictée", "Quiz SVT"],
                "MATHS": ["Thalès", "Probabilités"],
                qs: [
                    { q: "SVT : Combien de chromosomes possède un humain ?", a: ["46", "23", "48"], c: "46" },
                    { q: "Maths : Quelle est la racine carrée de 144 ?", a: ["12", "14", "11"], c: "12" },
                    { q: "Anglais : Lequel est un verbe irrégulier ?", a: ["To Go", "To Play", "To Listen"], c: "To Go" }
                ]
            }
        };

        let currentClass = "6eme";
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        let xp = parseInt(localStorage.getItem('xp')) || 0;
        let hasHat = localStorage.getItem('hasHat') === 'true';

        function changeClass(lvl) {
            currentClass = lvl;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderMenu();
        }

        function renderMenu() {
            const menu = document.getElementById('menu-content');
            menu.innerHTML = "";
            const data = schoolData[currentClass];
            for (let cat in data) {
                if (cat === "qs") continue;
                let title = document.createElement('div');
                title.className = "category-title";
                title.innerText = cat;
                menu.appendChild(title);
                data[cat].forEach(chap => {
                    let link = document.createElement('a');
                    link.className = "chapter-link";
                    link.innerText = "📚 " + chap;
                    link.onclick = () => startExercise(chap);
                    menu.appendChild(link);
                });
            }
        }

        function startExercise(name) {
            document.getElementById('current-category').innerText = "Chapitre : " + name;
            document.getElementById('exercise-card').classList.remove('hidden');
            document.getElementById('pet-talk').innerText = "Prêt pour " + name + " ? Miaou !";
            nextQuestion();
        }

        function nextQuestion() {
            const list = schoolData[currentClass].qs;
            const q = list[Math.floor(Math.random() * list.length)];
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            q.a.sort(() => Math.random() - 0.5).forEach(opt => {
                const b = document.createElement('button');
                b.className = "btn-opt";
                b.innerText = opt;
                b.onclick = () => {
                    if (opt === q.c) {
                        coins += 10; xp += 20;
                        document.getElementById('pet-talk').innerText = "MIAOU ! Excellente réponse ! 💰";
                        playSound('https://www.myinstants.com/media/sounds/mario-coin.mp3');
                    } else {
                        document.getElementById('pet-talk').innerText = "Mmm... essaie encore !";
                        playSound('https://www.myinstants.com/media/sounds/error.mp3');
                    }
                    save();
                    nextQuestion();
                };
                container.appendChild(b);
            });
        }

        function buyHat() {
            if (coins >= 50) {
                coins -= 50; hasHat = true;
                save();
                document.getElementById('pet-talk').innerText = "Ron-ron... Je suis magnifique !";
            } else {
                alert("Il te faut 50 pièces !");
            }
        }

        function playSound(url) { new Audio(url).play(); }

        function save() {
            localStorage.setItem('coins', coins);
            localStorage.setItem('xp', xp);
            localStorage.setItem('hasHat', hasHat);
            document.getElementById('coins-val').innerText = coins;
            document.getElementById('xp-val').innerText = xp;
            document.getElementById('lvl-val').innerText = Math.floor(xp/100) + 1;
            if (hasHat) document.getElementById('pet-accessory').style.display = 'block';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'u') {
                const sb = document.getElementById('soundboard');
                sb.style.display = (sb.style.display === 'block') ? 'none' : 'block';
            }
        });

        renderMenu();
        save();
    </script>
</body>
</html>
