<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plateforme Éducative - Mode Ninja</title>
    <style>
        :root { --sidebar-width: 280px; --primary: #8e44ad; --orange: #e67e22; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: #fff; border-right: 3px solid var(--orange); padding: 15px; overflow-y: auto; }
        .classe-tabs { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab { padding: 8px 10px; cursor: pointer; border-radius: 5px; font-weight: bold; background: #f0f0f0; font-size: 0.75em; border: 1px solid #ddd; }
        .tab.active { background: var(--orange); color: white; border-color: #d35400; }
        .category-title { background: #fde3d0; color: #d35400; padding: 6px 12px; font-weight: bold; font-size: 0.8em; margin-top: 15px; border-radius: 4px; text-transform: uppercase; }
        .chapter-link { display: block; padding: 8px 12px; color: #555; text-decoration: none; font-size: 0.85em; cursor: pointer; border-left: 3px solid transparent; }
        .chapter-link:hover { background: #fff4ed; border-left: 3px solid var(--orange); color: #000; }

        /* MAIN */
        #main-content { flex-grow: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .header-stats { background: white; padding: 12px 25px; border-radius: 50px; border: 2px solid var(--primary); display: flex; gap: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        #exercise-card { background: white; padding: 30px; border-radius: 20px; border: 3px solid var(--primary); width: 100%; max-width: 500px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-opt { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 10px; cursor: pointer; background: #fff; font-size: 1.1em; transition: 0.2s; }
        .btn-opt:hover { background: #f8f5ff; border-color: var(--primary); }

        /* BOUTIQUE */
        .shop-container { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .shop-item { background: white; padding: 10px; border-radius: 15px; border: 2px solid #2ecc71; text-align: center; width: 110px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .shop-item button { background: #2ecc71; color: white; border: none; padding: 5px; border-radius: 5px; cursor: pointer; font-size: 0.8em; width: 100%; margin-top: 5px;}

        /* CHAT IA */
        #chat-ia { width: 100%; max-width: 500px; margin-top: 20px; background: #fff; border: 2px solid #ddd; border-radius: 15px; padding: 10px; display: flex; gap: 10px; }
        #chat-input { flex-grow: 1; padding: 8px; border-radius: 10px; border: 1px solid #ccc; }
        #chat-btn { padding: 8px 15px; border-radius: 10px; background: var(--primary); color: white; border: none; cursor: pointer; }

        /* PET & ACCESSOIRES */
        #pet-container { position: fixed; bottom: 20px; right: 20px; width: 180px; text-align: center; z-index: 1000; }
        #pet-img-container { position: relative; background: white; border-radius: 50%; padding: 10px; border: 3px solid var(--primary); width: 110px; height: 110px; margin: 0 auto; }
        .pet-avatar { width: 100%; height: 100%; object-fit: contain; }
        .acc-img { position: absolute; display: none; pointer-events: none; z-index: 1001; }
        
        #acc-hat { top: -20px; left: 15px; width: 80px; }
        #acc-glasses { top: 35px; left: 20px; width: 70px; }
        #acc-crown { top: -35px; left: 15px; width: 80px; }

        .speech-bubble { background: white; padding: 10px; border-radius: 15px; border: 2px solid #ddd; font-size: 0.85em; margin-bottom: 10px; font-weight: bold; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="classe-tabs">
            <div id="b6" class="tab active" onclick="changeClass('6eme')">6e</div>
            <div id="b5" class="tab" onclick="changeClass('5eme')">5e</div>
            <div id="b4" class="tab" onclick="changeClass('4eme')">4e</div>
            <div id="b3" class="tab" onclick="changeClass('3eme')">3e</div>
        </div>
        <div id="menu-content"></div>
    </div>

    <div id="main-content">
        <div class="header-stats">
            <span>💰 <b id="coins-val">0</b></span>
            <span>⭐ <b id="xp-val">0</b></span>
            <span>🎓 Niv. <b id="lvl-val">1</b></span>
        </div>

        <h3 id="current-title">Clique sur un chapitre à gauche</h3>
        
        <div id="exercise-card" class="hidden">
            <p id="question-text" style="font-weight: bold; font-size: 1.1em;"></p>
            <div id="options-container"></div>
        </div>

        <div id="chat-ia">
            <input type="text" id="chat-input" placeholder="Parle au chat...">
            <button id="chat-btn" onclick="askPet()">OK</button>
        </div>

        <div class="shop-container">
            <div class="shop-item">🎓<br>Diplômé<br><button onclick="buy('hat', 50)">50💰</button></div>
            <div class="shop-item">🕶️<br>Thug Life<br><button onclick="buy('glasses', 80)">80💰</button></div>
            <div class="shop-item">👑<br>Royal<br><button onclick="buy('crown', 200)">200💰</button></div>
        </div>
    </div>

    <div id="pet-container">
        <div class="speech-bubble" id="pet-talk">Salut l'ami !</div>
        <div id="pet-img-container">
            <img id="acc-hat" class="acc-img" src="https://www.pngall.com/wp-content/uploads/2016/05/Graduation-Hat-PNG-Clipart.png">
            <img id="acc-glasses" class="acc-img" src="https://www.pngall.com/wp-content/uploads/2016/04/Thug-Life-Glasses-PNG-Clipart.png">
            <img id="acc-crown" class="acc-img" src="https://www.pngall.com/wp-content/uploads/2016/04/Crown-PNG-File.png">
            <img class="pet-avatar" src="https://cdn-icons-png.flaticon.com/512/616/616430.png">
        </div>
    </div>

    <script>
        const sounds = {
            1: 'https://www.myinstants.com/media/sounds/mario-coin.mp3',
            2: 'https://www.myinstants.com/media/sounds/discord-notification.mp3',
            3: 'https://www.myinstants.com/media/sounds/fail-horn.mp3',
            6: 'https://www.myinstants.com/media/sounds/nelson-haha.mp3'
        };

        const schoolData = {
            "6eme": {
                "MATHS": { "Nombres": [{q:"15+15?", a:["30","40"], c:"30"}, {q:"10 x 10?", a:["100","1000"], c:"100"}] },
                "HISTOIRE": { "Tautavel": [
                    {q:"Âge de l'Homme de Tautavel ?", a:["450 000 ans","10 000 ans"], c:"450 000 ans"},
                    {q:"Où a-t-on trouvé son crâne ?", a:["Caune de l'Arago","Grotte Lascaux"], c:"Caune de l'Arago"},
                    {q:"Était-il un Homo Sapiens ?", a:["Non, Erectus","Oui"], c:"Non, Erectus"}
                ]}
            },
            "5eme": { "HISTOIRE": { "Islam": [{q:"L'Hégire date de ?", a:["622","800"], c:"622"}] } },
            "4eme": { "SCIENCES": { "Chimie": [{q:"Molécule d'Eau ?", a:["H2O","CO2"], c:"H2O"}] } },
            "3eme": { "BREVET": { "Génétique": [{q:"Nombre de chromosomes ?", a:["46","23"], c:"46"}] } }
        };

        let coins = parseInt(localStorage.getItem('coins')) || 0;
        let xp = parseInt(localStorage.getItem('xp')) || 0;
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
        let currentClass = "6eme";
        let currentChapData = [];

        function changeClass(lvl) {
            currentClass = lvl;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('b'+lvl.charAt(0)).classList.add('active');
            renderMenu();
        }

        function renderMenu() {
            const menu = document.getElementById('menu-content');
            menu.innerHTML = "";
            const subs = schoolData[currentClass];
            for (let s in subs) {
                let t = document.createElement('div'); t.className="category-title"; t.innerText=s; menu.appendChild(t);
                for (let c in subs[s]) {
                    let l = document.createElement('a'); l.className="chapter-link"; l.innerText="📁 "+c;
                    l.onclick = () => { currentChapData = subs[s][c]; startExercise(c); };
                    menu.appendChild(l);
                }
            }
        }

        function startExercise(name) {
            document.getElementById('current-title').innerText = "Chapitre : " + name;
            document.getElementById('exercise-card').classList.remove('hidden');
            nextQuestion();
        }

        function nextQuestion() {
            const q = currentChapData[Math.floor(Math.random() * currentChapData.length)];
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            q.a.forEach(opt => {
                const b = document.createElement('button'); b.className = "btn-opt"; b.innerText = opt;
                b.onclick = () => {
                    if(opt === q.c) { 
                        coins += 10; xp += 15; 
                        new Audio(sounds[1]).play(); 
                        document.getElementById('pet-talk').innerText="Ron-ron ! Correct !"; 
                    } else { 
                        new Audio(sounds[3]).play(); 
                        document.getElementById('pet-talk').innerText="Miaou... non !"; 
                    }
                    save();
                    setTimeout(nextQuestion, 600);
                };
                container.appendChild(b);
            });
        }

        function askPet() {
            const input = document.getElementById('chat-input').value.toLowerCase();
            const talk = document.getElementById('pet-talk');
            if(input.includes("souris")) talk.innerText = "Chasser des souris ? Ma passion !";
            else if(input.includes("nom")) talk.innerText = "Appelle-moi Maître Chat !";
            else if(input.includes("argent") || input.includes("pièces")) talk.innerText = "Travaille bien pour gagner des 💰 !";
            else if(input.includes("prof")) talk.innerText = "Elle va être impressionnée, c'est sûr !";
            else talk.innerText = "Miaou ? Je réfléchis encore...";
            document.getElementById('chat-input').value = "";
        }

        function buy(item, price) {
            if (inventory.includes(item)) return alert("Tu l'as déjà !");
            if (coins >= price) {
                coins -= price; inventory.push(item); save();
                document.getElementById('pet-talk').innerText = "Regarde mon nouveau style !";
            } else alert("Il te manque des pièces !");
        }

        function save() {
            localStorage.setItem('coins', coins);
            localStorage.setItem('xp', xp);
            localStorage.setItem('inventory', JSON.stringify(inventory));
            document.getElementById('coins-val').innerText = coins;
            document.getElementById('xp-val').innerText = xp;
            document.getElementById('lvl-val').innerText = Math.floor(xp/100) + 1;
            inventory.forEach(i => {
                const el = document.getElementById('acc-'+i);
                if(el) el.style.display = 'block';
            });
        }

        document.addEventListener('keydown', (e) => {
            if(sounds[e.key]) new Audio(sounds[e.key]).play();
        });

        renderMenu(); save();
    </script>
</body>
</html>
