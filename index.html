<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>École Virtuelle - Édition Finale Totale</title>
    <style>
        :root { --sidebar-width: 260px; --primary: #8e44ad; --orange: #e67e22; --bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; touch-action: manipulation; }

        /* --- PROTECTION GHOST (Touche N) --- */
        #ghost-overlay { position: fixed; inset: 0; z-index: 100000; display: none; background: #fff; }
        #ghost-overlay img { width: 100%; height: 100%; object-fit: contain; background: #fff; }

        /* --- SIDEBAR STYLE CAPTURE --- */
        #sidebar { width: var(--sidebar-width); border-right: 2px solid var(--orange); padding: 20px; background: #fff; z-index: 10; flex-shrink: 0; }
        .tabs-top { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { padding: 8px 20px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-weight: bold; background: #f0f0f0; font-size: 14px; }
        .tab-btn.active { background: var(--orange); color: white; border-color: var(--orange); }
        .menu-title { font-weight: bold; font-size: 16px; margin: 20px 0 15px 0; color: #333; }
        .chapter-link { display: block; color: #0000ee; text-decoration: underline; cursor: pointer; margin: 12px 0; font-size: 15px; }

        /* --- CONTENU PRINCIPAL --- */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding-top: 30px; position: relative; }
        
        /* BARRE DE STATS AVEC HOTSPOTS CACHÉS (MOBILE & PC) */
        .stats-bar-container { position: relative; display: inline-block; margin-bottom: 30px; }
        .stats-bar { display: flex; gap: 25px; background: white; padding: 12px 40px; border: 3px solid var(--primary); border-radius: 40px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        .stats-bar span { font-weight: bold; font-size: 17px; display: flex; align-items: center; gap: 10px; }
        
        /* Boutons invisibles soundboard */
        .secret-trigger { position: absolute; top: 0; height: 100%; width: 33%; cursor: pointer; background: transparent; border: none; outline: none; -webkit-tap-highlight-color: transparent; }
        #btn-fah { left: 0; }
        #btn-disc { left: 33%; }
        #btn-bruh { left: 66%; }

        /* BOUTIQUE ET CHAT AREA */
        .shop-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .shop-item { width: 110px; height: 110px; border: 2px solid #ddd; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; font-size: 13px; font-weight: bold; }
        .shop-item.owned { border-color: #2ecc71; background: #fafffa; }
        
        .chat-area { display: flex; gap: 10px; margin-bottom: 30px; }
        .chat-in { padding: 10px 15px; border: 1px solid #ccc; border-radius: 8px; width: 250px; }

        /* EXERCICES CARD */
        #exercise-card { background: white; padding: 35px; border-radius: 20px; border: 3px solid var(--primary); width: 500px; max-width: 90%; text-align: center; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        #q-text { font-size: 1.3em; margin-bottom: 25px; font-weight: bold; }
        .btn-opt { display: block; width: 100%; padding: 15px; margin: 12px 0; border: 2px solid #eee; border-radius: 12px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-opt:hover { background: #f4f4f4; border-color: var(--primary); }

        /* --- GEOMETRY DASH STYLE --- */
        #gd-game { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 350px; background: #1a1a1a; border: 5px solid #00ff00; z-index: 15000; display: none; border-radius: 20px; overflow: hidden; }
        .cube { width: 45px; height: 45px; background: #00ff00; position: absolute; bottom: 50px; left: 60px; box-shadow: 0 0 15px #00ff00; }
        .obstacle { width: 35px; height: 35px; background: #ff4757; position: absolute; bottom: 50px; right: -50px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        /* --- PET & BUBBLE --- */
        #pet-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; align-items: flex-end; }
        .bubble { background: white; border: 1px solid #ccc; border-radius: 20px; padding: 15px; margin-bottom: 15px; font-size: 14px; max-width: 220px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .cat-icon { width: 130px; height: 130px; background: url('https://cdn-icons-png.flaticon.com/512/616/616430.png') no-repeat center/contain; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ghost-overlay" onclick="this.style.display='none'">
        <img src="https://i.ibb.co/XkyYmGz/pronote-mockup.png">
    </div>

    <div id="sidebar">
        <div class="tabs-top">
            <div class="tab-btn active">6ème</div>
            <div class="tab-btn">3ème</div>
        </div>
        <div class="menu-title">MATHÉMATIQUES</div>
        <a class="chapter-link" onclick="load('vocab')">📁 Vocabulaire : Somme, Produit...</a>
        <a class="chapter-link" onclick="load('entiers')">📁 Nombres entiers : Position</a>
        <a class="chapter-link" onclick="load('decimaux')">📁 Nombres décimaux : Virgule</a>
        <a class="chapter-link" onclick="load('fractions')">📁 Fractions décimales</a>
    </div>

    <div id="main-content">
        <div class="stats-bar-container">
            <div class="stats-bar">
                <span>💰 <b id="c-v">36540</b></span>
                <span>⭐ <b id="x-v">55535</b></span>
                <span>🎓 Niv. <b id="l-v">556</b></span>
            </div>
            <button id="btn-fah" class="secret-trigger" title="Fahhhh" onclick="sp(1)"></button>
            <button id="btn-disc" class="secret-trigger" title="Discord" onclick="sp(2)"></button>
            <button id="btn-bruh" class="secret-trigger" title="Bruh" onclick="sp(3)"></button>
        </div>

        <div class="chat-area">
            <input type="text" class="chat-in" placeholder="Calculer, rire, blague...">
            <button style="padding:10px 20px; cursor:pointer;" onclick="alert('Message envoyé au prof virtuel !')">OK</button>
        </div>

        <div class="shop-container">
            <div class="shop-item owned">🎓<br>Diplôme<br>50 💰</div>
            <div class="shop-item">👽<br>Virus<br>Caché</div>
        </div>

        <div id="exercise-card">
            <p id="q-text"></p>
            <div id="opt-cont"></div>
        </div>

        <div id="pet-container">
            <div class="bubble" id="p-m">Révise tes cours pour gagner des pièces et troller ! 😼</div>
            <div class="cat-icon" onclick="toggleGD()"></div>
        </div>
    </div>

    <div id="gd-game" onclick="jump()">
        <div class="cube" id="cube"></div>
        <div id="obs" class="obstacle"></div>
        <div style="position:absolute; bottom:0; width:100%; height:50px; background:#444;"></div>
        <div style="position:absolute; top:10px; right:10px; color:#0f0; font-family:monospace;">GD MODE ACTIVE</div>
    </div>

    <script>
        // --- LOGIQUE SOUNDBOARD SPAM ---
        const urls = {
            1: 'https://www.myinstants.com/media/sounds/fahhhh.mp3',
            2: 'https://www.myinstants.com/media/sounds/discord-notification.mp3',
            3: 'https://www.myinstants.com/media/sounds/bruh.mp3'
        };
        function sp(id) { let a = new Audio(urls[id]); a.currentTime = 0; a.play(); }

        // --- DONNEES DES COURS ---
        const data = {
            "vocab": [
                {q:"Le résultat d'une addition est une...", a:["Somme","Différence","Produit","Quotient"], c:"Somme"},
                {q:"Dans une multiplication, les nombres multipliés sont des...", a:["Facteurs","Termes","Dividendes","Restes"], c:"Facteurs"}
            ],
            "entiers": [
                {q:"Dans 12 345, quel est le chiffre des dizaines ?", a:["4","3","5","2"], c:"4"},
                {q:"Quel est le nombre de centaines dans 4 567 ?", a:["45","5","456","4"], c:"45"}
            ],
            "decimaux": [
                {q:"Dans 3,1416, quelle est la partie entière ?", a:["3","1416","31","4"], c:"3"},
                {q:"Le chiffre des millièmes dans 1,2345 est...", a:["4","2","3","5"], c:"4"}
            ],
            "fractions": [
                {q:"Comment écrit-on 7 dixièmes ?", a:["7/10","7/100","10/7","0,07"], c:"7/10"},
                {q:"1 unité est égale à combien de centièmes ?", a:["100","10","1000","1"], c:"100"}
            ]
        };

        let coins = 36540, xp = 55535;

        function load(id) { 
            current = data[id]; 
            document.getElementById('exercise-card').style.display = 'block'; 
            ask(); 
        }

        function ask() {
            let q = current[Math.floor(Math.random()*current.length)];
            document.getElementById('q-text').innerText = q.q;
            let container = document.getElementById('opt-cont');
            container.innerHTML = "";
            q.a.forEach(option => {
                let b = document.createElement('button');
                b.className = "btn-opt";
                b.innerText = option;
                b.onclick = () => {
                    if(option === q.c) {
                        coins += 50; xp += 100;
                        document.getElementById('p-m').innerText = "Bien joué ! +50💰";
                    } else {
                        document.getElementById('p-m').innerText = "Dommage... réessaie !";
                    }
                    update(); ask();
                };
                container.appendChild(b);
            });
        }

        function update() {
            document.getElementById('c-v').innerText = coins;
            document.getElementById('x-v').innerText = xp;
            document.getElementById('l-v').innerText = Math.floor(xp/100);
        }

        // --- GEOMETRY DASH LOGIQUE ---
        function toggleGD() {
            let g = document.getElementById('gd-game');
            g.style.display = (g.style.display === 'block' ? 'none' : 'block');
            if(g.style.display === 'block') runGD();
        }

        function jump() {
            let c = document.getElementById('cube');
            if(c.style.bottom === "150px") return;
            c.style.transition = "0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67)";
            c.style.bottom = "150px";
            setTimeout(() => { c.style.bottom = "50px"; }, 300);
        }

        function runGD() {
            let o = document.getElementById('obs'); let pos = 600;
            let timer = setInterval(() => {
                if(document.getElementById('gd-game').style.display === 'none') { clearInterval(timer); return; }
                pos -= 8; if(pos < -50) pos = 600;
                o.style.right = (600 - pos) + "px";
            }, 20);
        }

        // --- ECOUTEUR CLAVIER ---
        document.addEventListener('keydown', (e) => {
            let k = e.key.toLowerCase();
            if(k === '1') sp(1);
            if(k === '2') sp(2);
            if(k === '3') sp(3);
            if(k === 'n') document.getElementById('ghost-overlay').style.display = 'block';
            if(k === 'g') toggleGD();
            if(e.code === 'Space') jump();
        });
    </script>
</body>
</html>
