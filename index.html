<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon École Virtuelle - Multi-Matières</title>
    <style>
        :root { --sidebar-width: 280px; --primary: #8e44ad; --orange: #e67e22; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* MENU GAUCHE */
        #sidebar { width: var(--sidebar-width); background: #fff; border-right: 3px solid var(--orange); padding: 15px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .classe-tabs { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab { padding: 8px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; background: #f0f0f0; border: 1px solid #ddd; font-size: 0.8em; }
        .tab.active { background: var(--orange); color: white; border-color: #d35400; }
        
        .category-title { background: #fde3d0; color: #d35400; padding: 6px 12px; font-weight: bold; font-size: 0.85em; margin-top: 15px; border-radius: 4px; text-transform: uppercase; }
        .chapter-link { display: block; padding: 8px 12px; color: #555; text-decoration: none; font-size: 0.85em; cursor: pointer; border-left: 3px solid transparent; transition: 0.2s; }
        .chapter-link:hover { background: #fff4ed; border-left: 3px solid var(--orange); color: #000; }

        /* ZONE CENTRALE */
        #main-content { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; position: relative; overflow-y: auto; }
        .header-stats { position: sticky; top: 0; background: white; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--primary); display: flex; gap: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; }
        
        #exercise-card { background: white; padding: 40px; border-radius: 25px; border: 4px solid var(--primary); width: 100%; max-width: 600px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin-top: 30px; }
        .btn-opt { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 2px solid #edf2f7; border-radius: 12px; cursor: pointer; background: #fff; font-size: 1.1em; transition: 0.2s; }
        .btn-opt:hover { background: #f8f5ff; border-color: var(--primary); transform: scale(1.02); }

        /* LE CHAT */
        #pet-container { position: fixed; bottom: 20px; right: 20px; width: 220px; text-align: center; z-index: 100; }
        #pet-img-container { position: relative; background: white; border-radius: 50%; padding: 15px; border: 4px solid var(--primary); box-shadow: 0 8px 25px rgba(0,0,0,0.2); width: 110px; height: 110px; margin: 0 auto; }
        .pet-avatar { width: 100%; height: 100%; object-fit: contain; }
        #pet-accessory { position: absolute; top: -20px; left: 20px; width: 80px; display: none; }
        .speech-bubble { background: white; padding: 10px; border-radius: 15px; border: 2px solid #ddd; font-size: 0.9em; margin-bottom: 10px; font-weight: bold; }

        /* SOUNDBOARD */
        #soundboard { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 30px; border: 6px solid var(--primary); display: none; z-index: 2000; text-align: center; }
        .sound-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .sound-btn { padding: 20px; font-size: 25px; border: none; border-radius: 15px; cursor: pointer; background: #f1c40f; }

        .shop-btn { margin-top: 20px; padding: 12px 30px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 50px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="classe-tabs">
            <div class="tab active" onclick="changeClass('6eme')">6e</div>
            <div class="tab" onclick="changeClass('5eme')">5e</div>
            <div class="tab" onclick="changeClass('4eme')">4e</div>
            <div class="tab" onclick="changeClass('3eme')">3e</div>
        </div>
        <div id="menu-content"></div>
    </div>

    <div id="main-content">
        <div class="header-stats">
            <span>💰 Pièces: <b id="coins-val">0</b></span>
            <span>⭐ XP: <b id="xp-val">0</b></span>
            <span>🎓 Niveau: <b id="lvl-val">1</b></span>
        </div>

        <h2 id="current-category-title">Sélectionne une matière</h2>
        
        <div id="exercise-card" class="hidden">
            <p id="question-text" style="font-weight:bold; font-size:1.2em;"></p>
            <div id="options-container"></div>
        </div>

        <button class="shop-btn" onclick="buyHat()">🛒 Boutique : Chapeau (50 pièces)</button>
    </div>

    <div id="pet-container">
        <div class="speech-bubble" id="pet-talk">Salut ! Prêt à bosser ?</div>
        <div id="pet-img-container">
            <img id="pet-accessory" src="https://cdn-icons-png.flaticon.com/512/7153/7153108.png">
            <img class="pet-avatar" src="https://cdn-icons-png.flaticon.com/512/616/616430.png">
        </div>
    </div>

    <div id="soundboard">
        <h2>🎵 Pause Musicale 🎵</h2>
        <div class="sound-grid">
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/anime-wow.mp3')">✨</button>
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/tada.mp3')">🎉</button>
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/mario-coin.mp3')">💰</button>
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/discord-notification.mp3')">🔔</button>
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/yeet.mp3')">🚀</button>
            <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/error.mp3')">❌</button>
        </div>
        <p>Appuie sur <b>U</b> pour fermer</p>
    </div>

    <script>
        const schoolData = {
            "6eme": {
                "MATHS": [
                    { q: "6e - Maths : 12 x 4 ?", a: ["48", "44", "52"], c: "48" },
                    { q: "6e - Maths : Quel angle fait 90° ?", a: ["Droit", "Aigu", "Obtus"], c: "Droit" }
                ],
                "FRANÇAIS": [
                    { q: "6e - Français : Féminin de 'Lion' ?", a: ["Lionne", "Lionte", "Lionesse"], c: "Lionne" }
                ],
                "HISTOIRE-GÉO": [
                    { q: "6e - Géo : Combien y a-t-il d'océans ?", a: ["5", "3", "7"], c: "5" }
                ]
            },
            "5eme": {
                "MATHS": [
                    { q: "5e - Maths : (-5) + (-3) ?", a: ["-8", "8", "-2"], c: "-8" }
                ],
                "HISTOIRE": [
                    { q: "5e - Hist : Qui a inventé l'imprimerie ?", a: ["Gutenberg", "Léonard de Vinci", "Charlemagne"], c: "Gutenberg" }
                ]
            },
            "4eme": {
                "SCIENCES": [
                    { q: "4e - SVT : Quel gaz respirons-nous ?", a: ["Dioxygène", "Diazote", "Dioxyde de carbone"], c: "Dioxygène" }
                ]
            },
            "3eme": {
                "MATHS": [
                    { q: "3e - Thalès : Les droites doivent être...", a: ["Parallèles", "Perpendiculaires", "Sécantes"], c: "Parallèles" }
                ],
                "FRANÇAIS": [
                    { q: "3e - Dictée : On écrit 'Ils...' ?", a: ["Mangeaient", "Mangeait", "Mangeais"], c: "Mangeaient" }
                ]
            }
        };

        let currentClass = "6eme";
        let currentSubject = "";
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        let xp = parseInt(localStorage.getItem('xp')) || 0;
        let hasHat = localStorage.getItem('hasHat') === 'true';

        function changeClass(lvl) {
            currentClass = lvl;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderMenu();
        }

        function renderMenu() {
            const menu = document.getElementById('menu-content');
            menu.innerHTML = "";
            const subjects = schoolData[currentClass];
            for (let sub in subjects) {
                let title = document.createElement('div');
                title.className = "category-title";
                title.innerText = sub;
                menu.appendChild(title);
                
                let link = document.createElement('a');
                link.className = "chapter-link";
                link.innerText = "📁 Ouvrir " + sub;
                link.onclick = () => startSubject(sub);
                menu.appendChild(link);
            }
        }

        function startSubject(sub) {
            currentSubject = sub;
            document.getElementById('current-category-title').innerText = "Matière : " + sub;
            document.getElementById('exercise-card').classList.remove('hidden');
            document.getElementById('pet-talk').innerText = "C'est parti pour les " + sub + " !";
            nextQuestion();
        }

        function nextQuestion() {
            const questions = schoolData[currentClass][currentSubject];
            const q = questions[Math.floor(Math.random() * questions.length)];
            
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            q.a.sort(() => Math.random() - 0.5).forEach(opt => {
                const b = document.createElement('button');
                b.className = "btn-opt";
                b.innerText = opt;
                b.onclick = () => {
                    if (opt === q.c) {
                        coins += 10; xp += 15;
                        document.getElementById('pet-talk').innerText = "Miaou ! C'est juste ! +10💰";
                        playSound('https://www.myinstants.com/media/sounds/mario-coin.mp3');
                    } else {
                        document.getElementById('pet-talk').innerText = "Oups ! Réessaie !";
                        playSound('https://www.myinstants.com/media/sounds/error.mp3');
                    }
                    save();
                    nextQuestion();
                };
                container.appendChild(b);
            });
        }

        function save() {
            localStorage.setItem('coins', coins);
            localStorage.setItem('xp', xp);
            localStorage.setItem('hasHat', hasHat);
            document.getElementById('coins-val').innerText = coins;
            document.getElementById('xp-val').innerText = xp;
            document.getElementById('lvl-val').innerText = Math.floor(xp/100) + 1;
            if (hasHat) document.getElementById('pet-accessory').style.display = 'block';
        }

        function buyHat() {
            if (coins >= 50) {
                coins -= 50; hasHat = true; save();
                alert("Chapeau acheté !");
            } else alert("Pas assez de pièces !");
        }

        function playSound(url) { new Audio(url).play(); }

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'u') {
                const sb = document.getElementById('soundboard');
                sb.style.display = (sb.style.display === 'block') ? 'none' : 'block';
            }
        });

        renderMenu();
        save();
    </script>
</body>
</html>
